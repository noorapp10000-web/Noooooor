name: Build Noor Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 2.3)'
        required: false
        default: '2.2'
      build_type:
        description: 'نوع البناء'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  KEYSTORE_PATH: ${{ github.workspace }}/noor-release.keystore

jobs:
  build-android:
    name: Build APK + AAB — Noor
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Accept Android SDK licenses ───────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          [ ! -f "$SDKMANAGER" ] && SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name "sdkmanager" 2>/dev/null | head -1) || true
          [ -n "$SDKMANAGER" ] && yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          echo "Android SDK: $ANDROID_HOME"

      # ── 4. pnpm + Node ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 5. Gradle cache ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 6. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 7. Build web app ──────────────────────────────────────────────────
      - name: Build web app
        run: pnpm --filter @workspace/noor run build
        env:
          BASE_PATH: /
          NODE_ENV: production

      # ── 8. Capacitor sync ─────────────────────────────────────────────────
      - name: Sync Capacitor to Android
        run: pnpm exec cap sync android

      # ── 9. Verify structure ───────────────────────────────────────────────
      - name: Verify Android project structure
        run: |
          echo "=== Web assets in Android ==="
          ls android/app/src/main/assets/public/ | head -5 && echo "OK" || echo "MISSING"
          echo "=== Splash logo ==="
          ls -lh android/app/src/main/res/drawable/splash_logo.* 2>/dev/null || echo "WARNING: splash_logo not found"
          echo "=== Values-v31 (Android 12+) ==="
          cat android/app/src/main/res/values-v31/themes.xml || echo "WARNING: values-v31/themes.xml missing"

      # ── 10. Android project setup ─────────────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      # ── 11. Create logs directory ─────────────────────────────────────────
      - name: Create build-logs directory
        run: mkdir -p /tmp/build-logs

      # ══════════════════════════════════════════════════════════════════════
      #  DEBUG BUILD
      # ══════════════════════════════════════════════════════════════════════
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: |
          cd android
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/build-logs/gradle-debug.log
          echo "BUILD_EXIT_CODE=$?" >> /tmp/build-logs/build-info.txt

      # ══════════════════════════════════════════════════════════════════════
      #  SIGNING KEYSTORE SETUP (release only)
      #  Uses bash logic (not YAML conditions) to check secret availability.
      # ══════════════════════════════════════════════════════════════════════
      - name: Setup signing keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS_SECRET: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD_SECRET: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD_SECRET: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $KEYSTORE_PATH
            echo "KEYSTORE_SOURCE=secret" >> /tmp/build-logs/build-info.txt
            echo "Using production keystore from GitHub Secret"
          else
            keytool -genkey -v \
              -keystore $KEYSTORE_PATH \
              -alias noor \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass noor_temp_2024 \
              -keypass noor_temp_2024 \
              -dname "CN=Noor App, OU=Mobile, O=Noor, L=Cairo, S=Cairo, C=EG" \
              -noprompt
            echo "KEYSTORE_SOURCE=temporary" >> /tmp/build-logs/build-info.txt
            echo "WARNING: Temporary keystore generated — NOT suitable for Play Store." | tee -a /tmp/build-logs/build-info.txt
            echo "Add KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD secrets for production signing." >> $GITHUB_STEP_SUMMARY
          fi
          ls -lh $KEYSTORE_PATH

      # ══════════════════════════════════════════════════════════════════════
      #  RELEASE APK (signed)
      # ══════════════════════════════════════════════════════════════════════
      - name: Build Release APK (signed)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          STORE_PASS="${STORE_PASSWORD:-noor_temp_2024}"
          KEY_PASS="${KEY_PASSWORD:-noor_temp_2024}"
          KEY_AL="${KEY_ALIAS:-noor}"

          cd android
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_AL" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            2>&1 | tee /tmp/build-logs/gradle-release-apk.log
          echo "APK_EXIT_CODE=$?" >> /tmp/build-logs/build-info.txt

      # ══════════════════════════════════════════════════════════════════════
      #  RELEASE AAB (signed — required for Play Store)
      # ══════════════════════════════════════════════════════════════════════
      - name: Build Release AAB (signed)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          STORE_PASS="${STORE_PASSWORD:-noor_temp_2024}"
          KEY_PASS="${KEY_PASSWORD:-noor_temp_2024}"
          KEY_AL="${KEY_ALIAS:-noor}"

          cd android
          set -o pipefail
          ./gradlew bundleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_AL" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            2>&1 | tee /tmp/build-logs/gradle-release-aab.log
          echo "AAB_EXIT_CODE=$?" >> /tmp/build-logs/build-info.txt

      # ══════════════════════════════════════════════════════════════════════
      #  COLLECT & UPLOAD LOGS — ALWAYS (even on failure)
      # ══════════════════════════════════════════════════════════════════════
      - name: Collect build environment info
        if: always()
        run: |
          {
            echo "=== Noor Android Build Log ==="
            echo "Date        : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Version     : ${{ github.event.inputs.version || '2.2' }}"
            echo "Build type  : ${{ github.event.inputs.build_type || 'debug' }}"
            echo "Branch      : ${{ github.ref_name }}"
            echo "Commit      : ${{ github.sha }}"
            echo "Runner OS   : ${{ runner.os }}"
            echo "Java        : $(java -version 2>&1 | head -1)"
            echo "Node        : $(node --version)"
            echo "pnpm        : $(pnpm --version)"
            echo "Android SDK : $ANDROID_HOME"
            echo ""
            echo "=== APK output ==="
            find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | xargs ls -lh 2>/dev/null || echo "No APK found"
            echo ""
            echo "=== AAB output ==="
            find android/app/build/outputs/bundle -name "*.aab" 2>/dev/null | xargs ls -lh 2>/dev/null || echo "No AAB found"
          } > /tmp/build-logs/build-environment.txt 2>&1 || true

      - name: Upload build logs (mandatory)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs-${{ github.event.inputs.build_type || 'debug' }}-run${{ github.run_number }}
          path: /tmp/build-logs/
          retention-days: 30
          if-no-files-found: warn

      # ══════════════════════════════════════════════════════════════════════
      #  UPLOAD ARTIFACTS
      # ══════════════════════════════════════════════════════════════════════
      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: noor-v${{ github.event.inputs.version || '2.2' }}-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK (signed)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: noor-v${{ github.event.inputs.version || '2.2' }}-release-signed-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release AAB (signed — Play Store)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: noor-v${{ github.event.inputs.version || '2.2' }}-release-signed-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          VERSION="${{ github.event.inputs.version || '2.2' }}"
          TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          {
            echo "## نور — Noor Android Build v${VERSION} (${TYPE})"
            echo ""
            echo "| الملف | الحجم | الحالة |"
            echo "|-------|-------|--------|"
            if [ "$TYPE" = "debug" ]; then
              APK=$(find android/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
              [ -n "$APK" ] && echo "| APK (debug) | $(du -sh "$APK" | cut -f1) | ✅ |" || echo "| APK (debug) | — | ❌ |"
            else
              APK=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
              AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" 2>/dev/null | head -1)
              [ -n "$APK" ] && echo "| APK (release, موقّع) | $(du -sh "$APK" | cut -f1) | ✅ |" || echo "| APK (release) | — | ❌ |"
              [ -n "$AAB" ] && echo "| AAB (release, موقّع) | $(du -sh "$AAB" | cut -f1) | ✅ |" || echo "| AAB (release) | — | ❌ |"
            fi
            echo "| Logs | /tmp/build-logs/ | ✅ |"
            echo ""
            echo "| المعلومات | القيمة |"
            echo "|-----------|--------|"
            echo "| Package | \`com.noor.app\` |"
            echo "| Version Name | ${VERSION} |"
            echo "| Min SDK | 22 (Android 5.1) |"
            echo "| Target SDK | 34 (Android 14) |"
          } >> $GITHUB_STEP_SUMMARY
