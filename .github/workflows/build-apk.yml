name: 🕌 بناء تطبيق نُور (APK)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 2.3)'
        required: false
        default: '2.2'
      build_type:
        description: 'نوع البناء'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build Noor APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Accept Android SDK licenses ───────────────────────────────────────
      - name: 🤖 Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          [ ! -f "$SDKMANAGER" ] && SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name "sdkmanager" 2>/dev/null | head -1)
          [ -n "$SDKMANAGER" ] && yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null | grep "android-34" && echo "✅ android-34 found" || echo "⚠️ android-34 NOT found"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null | grep "34" && echo "✅ build-tools 34 found" || echo "⚠️ build-tools 34 NOT found"

      # ── 4. pnpm ───────────────────────────────────────────────────────────────
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 5. Node.js 20 ─────────────────────────────────────────────────────────
      - name: 🟩 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 6. Cache Gradle ───────────────────────────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 7. Install dependencies ───────────────────────────────────────────────
      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 8. Build the web app (Vite) ───────────────────────────────────────────
      - name: 🏗️ Build web app
        run: pnpm --filter @workspace/noor run build
        env:
          VITE_FIREBASE_API_KEY: 'AIzaSyDOVE54x_j5fldKYwTRAG9QzdRok_pD074'
          VITE_FIREBASE_AUTH_DOMAIN: 'noooooor-app.firebaseapp.com'
          VITE_FIREBASE_PROJECT_ID: 'noooooor-app'
          VITE_FIREBASE_STORAGE_BUCKET: 'noooooor-app.firebasestorage.app'
          VITE_FIREBASE_MESSAGING_SENDER_ID: '230599694330'
          VITE_FIREBASE_APP_ID: '1:230599694330:web:8780636368d1469591f643'
          VITE_FIREBASE_MEASUREMENT_ID: 'G-P96TYMPZQF'
          BASE_PATH: /
          NODE_ENV: production

      # ── 9. Sync Capacitor ─────────────────────────────────────────────────────
      - name: 🔄 Sync Capacitor to Android
        run: pnpm exec cap sync android

      # ── 10. Ensure capacitor-cordova-android-plugins exists ──────────────────
      # This dir is gitignored but required by Gradle. cap sync creates it,
      # but we create a minimal fallback in case cap sync skipped it.
      - name: 🔧 Ensure capacitor-cordova-android-plugins is ready
        run: |
          PLUGINS_DIR="android/capacitor-cordova-android-plugins"
          mkdir -p "$PLUGINS_DIR/src/main"

          # cordova.variables.gradle — referenced by capacitor.build.gradle
          if [ ! -f "$PLUGINS_DIR/cordova.variables.gradle" ]; then
            echo "⚠️ cordova.variables.gradle missing — creating fallback"
            echo "ext {}" > "$PLUGINS_DIR/cordova.variables.gradle"
          else
            echo "✅ cordova.variables.gradle exists"
          fi

          # build.gradle — required for Gradle project compilation
          if [ ! -f "$PLUGINS_DIR/build.gradle" ]; then
            echo "⚠️ build.gradle missing — creating fallback"
            cat > "$PLUGINS_DIR/build.gradle" << 'GRADLE'
apply plugin: 'com.android.library'
android {
    namespace "cordovaplugins"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
GRADLE
          else
            echo "✅ build.gradle exists"
          fi

          # AndroidManifest.xml
          if [ ! -f "$PLUGINS_DIR/src/main/AndroidManifest.xml" ]; then
            echo "⚠️ AndroidManifest.xml missing — creating fallback"
            cat > "$PLUGINS_DIR/src/main/AndroidManifest.xml" << 'XML'
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
</manifest>
XML
          else
            echo "✅ AndroidManifest.xml exists"
          fi

          echo ""
          echo "=== capacitor.settings.gradle ==="
          cat android/capacitor.settings.gradle
          echo ""
          echo "=== web assets copied? ==="
          [ -d android/app/src/main/assets/public ] && echo "✅ YES" || echo "❌ NO"

      # ── 11. Create local.properties ───────────────────────────────────────────
      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 12. Gradle permissions ────────────────────────────────────────────────
      - name: 🔧 Fix Gradle permissions
        run: chmod +x android/gradlew

      # ── 13. Build APK ─────────────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log; RC=${PIPESTATUS[0]}

          if [ $RC -ne 0 ]; then
            echo ""
            echo "╔══════════════ BUILD FAILURE ══════════════╗"
            grep -A 40 "What went wrong:" /tmp/gradle.log | head -80 || true
            echo "╚═══════════════════════════════════════════╝"
            exit $RC
          fi

      - name: 🔐 Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log; RC=${PIPESTATUS[0]}

          if [ $RC -ne 0 ]; then
            echo ""
            echo "╔══════════════ BUILD FAILURE ══════════════╗"
            grep -A 40 "What went wrong:" /tmp/gradle.log | head -80 || true
            echo "╚═══════════════════════════════════════════╝"
            exit $RC
          fi

      # ── 14. Upload full Gradle log (always, for debugging) ────────────────────
      - name: 📋 Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log
          if-no-files-found: ignore

      # ── 15. Find APK ──────────────────────────────────────────────────────────
      - name: 📋 Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"

      # ── 16. Upload APK ────────────────────────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noor-v${{ github.event.inputs.version || '2.2' }}-${{ github.event.inputs.build_type || 'debug' }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 17. Summary ───────────────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## 🕌 تطبيق نُور — تم البناء بنجاح ✅" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.noor.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
