name: 🕌 بناء تطبيق نُور (APK)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 2.2)'
        required: false
        default: '2.2'

jobs:
  build-apk:
    name: Build Noor APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 (required by Android Gradle) ──────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. pnpm ───────────────────────────────────────────────────────────────
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 4. Node.js 20 ─────────────────────────────────────────────────────────
      - name: 🟩 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 5. Install dependencies ───────────────────────────────────────────────
      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 6. Build the web app (Vite) ───────────────────────────────────────────
      - name: 🏗️ Build web app
        run: cd artifacts/noor && pnpm build
        env:
          # Firebase config — public client-side keys (safe to expose)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaSyDOVE54x_j5fldKYwTRAG9QzdRok_pD074' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'noooooor-app.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'noooooor-app' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'noooooor-app.firebasestorage.app' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '230599694330' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:230599694330:web:8780636368d1469591f643' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || 'G-P96TYMPZQF' }}
          BASE_PATH: /
          NODE_ENV: production

      # ── 7. Sync Capacitor (copies built web app into Android project) ─────────
      - name: 🔄 Sync Capacitor to Android
        run: pnpm exec cap sync android

      # ── 8. Make Gradle wrapper executable ─────────────────────────────────────
      - name: 🔧 Fix Gradle permissions
        run: chmod +x android/gradlew

      # ── 9. Cache Gradle dependencies ──────────────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 10. Build Debug APK ───────────────────────────────────────────────────
      - name: 🔨 Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── 11. Find and rename APK ───────────────────────────────────────────────
      - name: 📋 Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      # ── 12. Upload APK as downloadable artifact ───────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: نور-app-v2.2
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 13. Summary ───────────────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## 🕌 تطبيق نُور — تم البناء بنجاح ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| التفصيل | القيمة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| الإصدار | v2.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| حجم الـ APK | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Package ID | com.noor.app |" >> $GITHUB_STEP_SUMMARY
          echo "| الـ Build | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⬇️ لتحميل الـ APK:" >> $GITHUB_STEP_SUMMARY
          echo "اذهب إلى **Actions → هذا الـ workflow → Artifacts** وحمّل **نور-app-v2.2**" >> $GITHUB_STEP_SUMMARY
