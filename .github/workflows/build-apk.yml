name: 🕌 بناء تطبيق نُور (APK)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثال: 2.3)'
        required: false
        default: '2.2'
      build_type:
        description: 'نوع البناء'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    name: Build Noor APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 (required by Android Gradle Plugin 8) ─────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Accept pre-installed Android SDK licenses ─────────────────────────
      # ubuntu-latest already ships with Android SDK 34 + build-tools 34.0.0
      - name: 🤖 Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name "sdkmanager" 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          else
            echo "sdkmanager not found, skipping license acceptance"
          fi

      # ── 4. pnpm ───────────────────────────────────────────────────────────────
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 5. Node.js 20 ─────────────────────────────────────────────────────────
      - name: 🟩 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 6. Cache Gradle ───────────────────────────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 7. Install dependencies ───────────────────────────────────────────────
      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 8. Build the web app (Vite) ───────────────────────────────────────────
      - name: 🏗️ Build web app
        run: pnpm --filter @workspace/noor run build
        env:
          VITE_FIREBASE_API_KEY: 'AIzaSyDOVE54x_j5fldKYwTRAG9QzdRok_pD074'
          VITE_FIREBASE_AUTH_DOMAIN: 'noooooor-app.firebaseapp.com'
          VITE_FIREBASE_PROJECT_ID: 'noooooor-app'
          VITE_FIREBASE_STORAGE_BUCKET: 'noooooor-app.firebasestorage.app'
          VITE_FIREBASE_MESSAGING_SENDER_ID: '230599694330'
          VITE_FIREBASE_APP_ID: '1:230599694330:web:8780636368d1469591f643'
          VITE_FIREBASE_MEASUREMENT_ID: 'G-P96TYMPZQF'
          BASE_PATH: /
          NODE_ENV: production

      # ── 9. Sync Capacitor → copies web assets + generates Android files ───────
      - name: 🔄 Sync Capacitor to Android
        run: pnpm exec cap sync android

      # ── 10. Verify cap sync output ────────────────────────────────────────────
      - name: 🔍 Verify Android project structure
        run: |
          echo "=== capacitor.settings.gradle ==="
          cat android/capacitor.settings.gradle
          echo ""
          echo "=== capacitor-cordova-android-plugins exists? ==="
          ls android/capacitor-cordova-android-plugins/ 2>/dev/null && echo "EXISTS" || echo "MISSING"
          echo ""
          echo "=== Web assets copied? ==="
          ls android/app/src/main/assets/public/ 2>/dev/null | head -5 && echo "EXISTS" || echo "MISSING"
          echo ""
          echo "=== node_modules/@capacitor/android path ==="
          find node_modules -path "*/capacitor/android/capacitor" -type d 2>/dev/null | head -3 || echo "NOT FOUND"

      # ── 11. Create local.properties (required by Gradle to find Android SDK) ──
      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "Created local.properties with sdk.dir=$ANDROID_HOME"
          echo "Verify SDK exists:"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null | grep "android-34" || echo "WARNING: android-34 not found!"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null | grep "34" || echo "WARNING: build-tools 34 not found!"

      # ── 12. Make Gradle wrapper executable ────────────────────────────────────
      - name: 🔧 Fix Gradle permissions
        run: chmod +x android/gradlew

      # ── 13. Build APK ─────────────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log
          grep -E "FAILURE|ERROR|error:|Exception|Could not" /tmp/gradle.log | tail -50 || true

      - name: 🔐 Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log
          grep -E "FAILURE|ERROR|error:|Exception|Could not" /tmp/gradle.log | tail -50 || true

      # ── 14. Find APK ──────────────────────────────────────────────────────────
      - name: 📋 Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      # ── 15. Upload APK ────────────────────────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noor-v${{ github.event.inputs.version || '2.2' }}-${{ github.event.inputs.build_type || 'debug' }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 16. Summary ───────────────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          VERSION="${{ github.event.inputs.version || '2.2' }}"
          echo "## 🕌 تطبيق نُور — تم البناء بنجاح ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| التفصيل | القيمة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| الإصدار | v${VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| حجم الـ APK | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package ID | com.noor.app |" >> $GITHUB_STEP_SUMMARY
          echo "| نوع البناء | ${BUILD_TYPE} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⬇️ لتحميل الـ APK:" >> $GITHUB_STEP_SUMMARY
          echo "اذهب إلى **Actions → هذا الـ workflow → Artifacts** وحمّل الملف" >> $GITHUB_STEP_SUMMARY
