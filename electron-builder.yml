appId: com.noor.app
productName: Noor
copyright: Copyright © 2024 Noor App

directories:
  app: electron
  output: dist-electron

files:
  - main.js
  - www/**
  - icon.png

win:
  target:
    - target: nsis
      arch: [x64]
  icon: icon.png

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  installerLanguages:
    - ar
    - en_US
  language: "1025"
